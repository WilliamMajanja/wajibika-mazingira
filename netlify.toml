[build]
  command = "npm install --legacy-peer-deps && npm run build"
  publish = "dist"

[dev]
  command = "vite"
  port = 8888
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# This rule is essential for Netlify Functions to work.
# It rewrites any request starting with /api/ to the corresponding function path.
[[redirects]]
  from = "/api/:path"
  to = "/.netlify/functions/:path"
  status = 200
