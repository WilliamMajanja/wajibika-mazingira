[build]
  command = "npm install --legacy-peer-deps && npm run build"
  publish = "dist"

[dev]
  command = "vite"
  port = 8888
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  GEMINI_API_KEY = "${GEMINI_API_KEY}"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
