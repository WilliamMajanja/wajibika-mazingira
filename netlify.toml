# Netlify configuration file

# Build settings
[build]
  # Command to build the Vite project
  command = "npm run build"
  # Directory where the built static files are located
  publish = "dist"
  # Directory where the serverless functions are located
  functions = "netlify/functions"

# Redirect rule for proxying API calls to functions
[[redirects]]
  # All requests from the frontend starting with /api/
  from = "/api/*"
  # Are rewritten to the corresponding Netlify function
  to = "/.netlify/functions/:splat"
  # Status 200 makes this a rewrite (proxy), not a redirect
  status = 200
